          label_en: "Term sheets"
          label_es: "Hojas de términos"
        - slug: purchase-agreement
          label_en: "Purchase agreement"
          label_es: "Contrato de compraventa"
      discovery:
        - slug: due-diligence
          label_en: "Due diligence"
          label_es: "Diligencia debida"
      administrative:
        - slug: regulatory-filings
          label_en: "Regulatory filings"
          label_es: "Presentaciones regulatorias"

  employment_dispute:
