# Matter catalog — maps matter types (slug) to suggested case-specific subfolders.
#
# Each subfolder is NESTED under one of the 7 default parents:
#   pleadings, contracts, discovery, evidence, correspondence, court-orders, administrative
#
# All "slug" values MUST be lowercase, hyphen-separated, ASCII only — they are the
# actual folder names on Dropbox / Supabase Storage.
#
# The label_en and label_es values are user-facing display names shown in
# Claude Desktop chat. They get stored in cases.folder_labels so that Claude
# can show pretty names while the system routes on slugs.

matters:
  contract_dispute:
    label_en: "Contract dispute"
    label_es: "Disputa contractual"
    folders:
      contracts:
        - slug: amendments
          label_en: "Amendments"
          label_es: "Enmiendas"
        - slug: exhibits-to-contract
          label_en: "Exhibits to contract"
          label_es: "Anexos del contrato"
        - slug: performance-records
          label_en: "Performance records"
          label_es: "Registros de cumplimiento"
      evidence:
        - slug: damages-calculations
          label_en: "Damages calculations"
          label_es: "Cálculo de daños"

  patent_infringement:
    label_en: "Patent infringement"
    label_es: "Infracción de patente"
    folders:
      pleadings:
        - slug: claim-charts
          label_en: "Claim charts"
          label_es: "Tablas de reivindicaciones"
      discovery:
        - slug: prior-art
          label_en: "Prior art"
          label_es: "Arte previo"
        - slug: inventor-depositions
          label_en: "Inventor depositions"
          label_es: "Declaraciones de inventor"
        - slug: technical-expert-reports
          label_en: "Technical expert reports"
          label_es: "Informes periciales técnicos"
      evidence:
        - slug: product-samples
          label_en: "Product samples / technical specs"
          label_es: "Muestras y especificaciones técnicas"

  merger_and_acquisition:
